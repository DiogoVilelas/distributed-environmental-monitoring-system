syntax = "proto3";

option java_package = "pt.uevora.sd.project.clientgrpc";
option java_outer_classname = "MetricsProto";

service MetricsService {
  rpc ingestMetric (MetricRequest) returns (MetricReply);
}

message MetricRequest {
  string deviceId = 1;
  double temperature = 2;
  double humidity = 3;
  string timestamp = 4;
}

message MetricReply {
  bool stored = 1;
  string message = 2;
}
