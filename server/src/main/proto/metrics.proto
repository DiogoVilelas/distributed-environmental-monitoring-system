syntax = "proto3";

option java_package = "pt.uevora.sd.project.server.grpc";
option java_outer_classname = "MetricsProto";

service MetricsService {
  rpc ingestMetric (MetricRequest) returns (MetricReply);
}

message MetricRequest {
  string deviceId = 1;
  double temperature = 2;
  double humidity = 3;
  string timestamp = 4; // ISO-8601, ex: 2025-12-23T18:20:24Z
}

message MetricReply {
  bool stored = 1;
  string message = 2;
}
